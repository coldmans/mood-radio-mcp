services:
  mood-radio-mcp:
    build: .
    image: mood-radio-mcp:local
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      MOOD_RADIO_DB: /data/mood-radio.sqlite
      MOOD_RADIO_POST_LIMIT: 20/3600
      MOOD_RADIO_PASS_LIMIT: 20/3600
      MOOD_RADIO_REACT_LIMIT: 80/3600
      MOOD_RADIO_REPORT_LIMIT: 20/3600
    volumes:
      - mood-radio-data:/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:%s/health' % os.getenv('PORT', '8000'), timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mood-radio-data:
